name: O229 Marketplace CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: laravel
          POSTGRES_DB: marketplace_test
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci_test_only_not_a_secret' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, bcmath, gd
        coverage: xdebug

    - name: Install Dependencies
      run: |
        cd backend
        composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Prepare Environment
      run: |
        cd backend
        cp .env.example .env
        php artisan key:generate

    - name: Run Tests
      env:
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: marketplace_test
        DB_USERNAME: laravel
        DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci_test_only_not_a_secret' }}
        CACHE_STORE: array
        SESSION_DRIVER: array
        QUEUE_CONNECTION: sync
      run: |
        cd backend
        php artisan test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build check
      run: |
        cd frontend
        npm run build
