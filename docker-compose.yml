
services:
  # ─── Laravel API ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: o229_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - o229_network

  # ─── Queue Worker ──────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: o229_worker
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - api
      - redis
    networks:
      - o229_network

  # ─── Next.js Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: o229_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ⚠️ IMPORTANT: En production, remplacez localhost par votre domaine (ex: https://api.o-229.com)
      # Pour tester sur mobile en local, utilisez l'IP de votre machine (ex: http://192.168.1.10:8000/api)
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - api
    networks:
      - o229_network

  # ─── Laravel Reverb (WebSockets) ─────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: o229_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - api
      - redis
    networks:
      - o229_network

  # ─── PostgreSQL 15 ────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: o229_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229_network

  # ─── Redis 7 ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: o229_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229_network

  # ─── Meilisearch ───────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: o229_meilisearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - o229_network

  # ─── pgAdmin ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: o229_pgadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@o229.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - o229_network

  # ─── MinIO (S3 Compatible Storage) ──────────────────
  minio:
    image: minio/minio
    container_name: o229_minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - o229_network

  # ─── Evolution API (WhatsApp API Gateway) ───────────
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: o229_wa_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - SERVER_URL=http://evolution_api:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${WA_API_KEY}
      - STORE_MESSAGES=true
      - STORE_CONTACTS=true
      - SESSIONS_TYPE=redis
      - REDIS_URI=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - o229_network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  o229_network:
    driver: bridge
